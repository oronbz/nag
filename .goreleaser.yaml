version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: nag
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
    ldflags:
      - -s -w -X main.version={{.Version}}

universal_binaries:
  - replace: true

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

brews:
  - repository:
      owner: oronbz
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/oronbz/nag"
    description: "A terminal UI for Apple Reminders"
    license: "MIT"
    install: |
      bin.install "nag"
    test: |
      assert_match version.to_s, shell_output("#{bin}/nag version")
